# ── redirect HTTP → HTTPS ────────────────────────────────
server {
    listen 80;
    server_name twojadomena.pl www.twojadomena.pl;
    return 301 https://$host$request_uri;
}

# ── główny serwer HTTPS ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name twojadomena.pl www.twojadomena.pl;

    # ── certyfikaty SSL (Let's Encrypt) ──────────────────
    # Wygeneruj: certbot --nginx -d twojadomena.pl
    ssl_certificate     /etc/letsencrypt/live/twojadomena.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twojadomena.pl/privkey.pem;

    # ── ustawienia SSL ────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── nagłówki bezpieczeństwa ───────────────────────────
    # blokuje osadzanie strony w iframe (clickjacking)
    add_header X-Frame-Options "DENY" always;

    # blokuje sniffing typów MIME
    add_header X-Content-Type-Options "nosniff" always;

    # wymusza HTTPS przez rok
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # blokuje zewnętrzne skrypty / style / zasoby
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline';
        style-src   'self' 'unsafe-inline';
        img-src     'self' data:;
        font-src    'self';
        connect-src 'self' https://api.twojadomena.pl;
    " always;

    # wyłącza wysyłanie Referrer do zewnętrznych domen
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # blokuje dostęp do wrażliwych API przeglądarki
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── pliki React SPA ───────────────────────────────────
    root /var/www/admin-panel/dist;
    index index.html;

    # SPA routing — wszystkie URL-e kieruj do index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # statyczne pliki — długi cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — bez cache (żeby zawsze była świeża wersja)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── proxy do backendu API ─────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}